<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝶变计划 - 项目管控看板</title>
    <!-- 本地ECharts -->
    <script src="vendor/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --success: #34a853;
            --warning: #fbbc04;
            --danger: #ea4335;
            --purple: #7c4dff;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1e2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 顶部导航 */
        .header {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg-card-hover);
        }

        /* 主内容区 */
        .main-content {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .stat-card.signed::before { background: var(--primary); }
        .stat-card.started::before { background: var(--warning); }
        .stat-card.approved::before { background: var(--success); }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--border);
            box-shadow: var(--shadow);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .stat-card-title {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-card.signed .stat-card-icon { background: rgba(26, 115, 232, 0.2); }
        .stat-card.started .stat-card-icon { background: rgba(251, 188, 4, 0.2); }
        .stat-card.approved .stat-card-icon { background: rgba(52, 168, 83, 0.2); }

        .stat-card-value {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--bg-card);
            padding: 8px;
            border-radius: 12px;
            width: fit-content;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-secondary);
            border: none;
            background: transparent;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        /* 内容区 */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* 重点推进模块 */
        .priority-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
        }

        .priority-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .priority-title {
            font-size: 18px;
            font-weight: 600;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 14px;
            min-width: 140px;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--bg-dark);
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .data-table tr:hover {
            background: var(--bg-card-hover);
        }

        .data-table td {
            color: var(--text-primary);
        }

        .editable-cell {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .editable-cell:hover {
            background: rgba(26, 115, 232, 0.2);
        }

        .status-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-tag.priority {
            background: rgba(124, 77, 255, 0.2);
            color: var(--purple);
        }

        .status-tag.reserve {
            background: rgba(26, 115, 232, 0.2);
            color: var(--primary);
        }

        /* 地图模块 */
        .map-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
        }

        .map-container {
            height: 600px;
            background: var(--bg-dark);
            border-radius: 12px;
            overflow: hidden;
        }

        .map-legend {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.blue { background: var(--primary); }
        .legend-dot.green { background: var(--success); }
        .legend-dot.red { background: var(--danger); }
        .legend-dot.yellow { background: var(--warning); }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--bg-dark);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        /* 项目详情 */
        .project-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .detail-item {
            background: var(--bg-dark);
            padding: 16px;
            border-radius: 12px;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 500;
        }

        .detail-full {
            grid-column: 1 / -1;
        }

        .detail-textarea {
            width: 100%;
            min-height: 120px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 14px;
            resize: vertical;
        }

        .detail-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 进度时间线 */
        .progress-timeline {
            margin-top: 24px;
        }

        .timeline-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .timeline-item {
            display: flex;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .timeline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            margin-top: 6px;
            flex-shrink: 0;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-stage {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .timeline-node {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-card:last-child {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header {
                padding: 0 16px;
            }
            .main-content {
                padding: 16px;
            }
            .tabs {
                width: 100%;
                overflow-x: auto;
            }
            .project-detail-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 飞书同步按钮 */
        .feishu-sync {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #3370ff, #0867ff);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .feishu-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(51, 112, 255, 0.4);
        }

        .feishu-sync.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>

            </div>
            <div class="stat-card started" onclick="openProjectList('started')">
                <div class="stat-card-header">
                    <span class="stat-card-title">已开工项目</span>
                    <div class="stat-card-icon">🏗️</div>
                </div>
                <div class="stat-card-value" id="stat-started">--</div>
                <div class="stat-card-desc">点击查看项目详情</div>
            </div>
            <div class="stat-card approved" onclick="openProjectList('approved')">
                <div class="stat-card-header">
                    <span class="stat-card-title">已批复未开工</span>
                    <div class="stat-card-icon">✅</div>
                </div>
                <div class="stat-card-value" id="stat-approved">--</div>
                <div class="stat-card-desc">点击查看项目清单</div>
            </div>
        </section>

        <!-- 标签页 -->
        <div class="tabs">

            <button class="tab" data-tab="priority">重点推进</button>
            <button class="tab" data-tab="map">项目地图</button>
        </div>

        <!-- 总览 -->
        <section class="content-section active" id="section-overview">
            <div class="priority-section">
                <div class="priority-header">
                    <h2 class="priority-title">📊 项目统计概览</h2>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>项目类型</th>
                                <th>项目数量</th>
                                <th>总规模</th>
                                <th>涉及省份</th>
                            </tr>
                        </thead>
                        <tbody id="overview-table">
                            <tr><td colspan="4" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 重点推进 -->

                    <button class="btn btn-primary" onclick="savePriorityChanges()">
                        <span>💾</span> 保存修改

                </div>
                <div class="filter-bar">
                    <select class="filter-select" id="filter-province" onchange="filterPriority()">

                    </select>
                    <select class="filter-select" id="filter-manager" onchange="filterPriority()">

    <script>
        // 全局数据
        let allData = {};
        let priorityData = [];
        let mapData = [];
        let archiveData = {};
        let currentListType = '';

        // API基础路径
        const API_BASE = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            loadData();
        });

        // 标签页切换
        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`section-${tab.dataset.tab}`).classList.add('active');
                    
                    // 切换到地图时渲染
                    if (tab.dataset.tab === 'map') {
                        setTimeout(renderMap, 100);
                    }
                });
            });
        }

        // 加载数据
        async function loadData() {
            try {
                // 加载统计数据
                const stats = EMBEDDED_DATA.stats || {};
                document.getElementById('stat-signed').textContent = stats.pure_signed_count || 0;
                document.getElementById('stat-started').textContent = stats.started_count || 0;
                document.getElementById('stat-approved').textContent = stats.approved_count || 0;

                // 加载概览数据
                await loadOverviewTable();

                // 加载重点推进数据
                await loadPriorityData();

                // 加载地图数据
                await loadMapData();

            } catch (e) {
                console.error('数据加载失败:', e);
            }
        }

        // 加载概览表格
        async function loadOverviewTable() {
            try {
                const signed = getProjectsByType('signed');
                const started = getProjectsByType('started');
                const approved = getProjectsByType('approved');
                const priority = getProjectsByType('priority');
                const blocked = getProjectsByType('blocked');

                const provinces = new Set();
                [...signed, ...started, ...approved, ...priority, ...blocked].forEach(p => {
                    if (p.province) provinces.add(p.province);
                });

                const rows = [
                    ['纯已签约', signed.length, calculateScale(signed), provinces.size],
                    ['已开工', started.length, calculateScale(started), new Set(started.map(p => p.province)).size],
                    ['已批复未开工', approved.length, calculateScale(approved), new Set(approved.map(p => p.province)).size],
                    ['重点推进', priority.length, calculateScale(priority), new Set(priority.map(p => p.province)).size],
                    ['无法推进', blocked.length, calculateScale(blocked), new Set(blocked.map(p => p.province)).size]
                ];

                document.getElementById('overview-table').innerHTML = rows.map(row => `

        // 单元格编辑
        function handleCellEdit(e) {
            const cell = e.currentTarget;
            const field = cell.dataset.field;
            const id = cell.dataset.id;
            const currentValue = cell.textContent.trim();

            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentValue === '-' ? '' : currentValue;
            input.style.cssText = 'width: 100%; padding: 4px; border: 1px solid var(--primary); border-radius: 4px; background: var(--bg-dark); color: var(--text-primary);';

            cell.innerHTML = '';
            cell.appendChild(input);
            input.focus();

            const save = () => {
                const newValue = input.value.trim();
                cell.textContent = newValue || '-';
                
                // 更新数据
                const project = priorityData.find(p => p.id == id);
                if (project) {
                    project[field] = newValue;
                }
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    input.blur();
                } else if (e.key === 'Escape') {
                    cell.textContent = currentValue;
                }
            });
        }
