<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #00ff41;
  font-family: 'Courier New', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
}

/* 扫描线效果 */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 9999;
}

/* 闪烁光标 */
@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
.cursor { display: inline-block; width: 8px; height: 14px; background: #00ff41; animation: blink 1s infinite; vertical-align: middle; margin-left: 2px; }

/* 顶部状态栏 */
.topbar {
  background: #111;
  border-bottom: 1px solid #00ff4133;
  padding: 6px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: #00ff41aa;
}
.topbar .title { color: #00ff41; font-weight: bold; font-size: 13px; }
.topbar .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00ff41; margin-right: 6px; animation: blink 2s infinite; }

/* 主布局 */
.main {
  display: flex;
  height: calc(100vh - 32px);
}

/* 左侧代码区 */
.code-panel {
  flex: 1;
  padding: 16px;
  overflow: hidden;
  border-right: 1px solid #00ff4122;
  display: flex;
  flex-direction: column;
}
.code-header {
  color: #00ff4188;
  font-size: 11px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid #00ff4115;
  display: flex;
  justify-content: space-between;
}
.code-content {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.code-line {
  white-space: pre;
  opacity: 0;
  transition: opacity 0.3s;
}
.code-line.visible { opacity: 1; }
.line-num { color: #00ff4144; margin-right: 16px; user-select: none; }
.keyword { color: #ff6ac1; }
.string { color: #f3e779; }
.func { color: #69b4ff; }
.comment { color: #555; font-style: italic; }
.number { color: #ff9b43; }
.type { color: #9aedfe; }
.operator { color: #ff6ac1; }

/* 右侧面板 */
.right-panel {
  width: 340px;
  display: flex;
  flex-direction: column;
  background: #0d0d0d;
}

/* 系统监控 */
.monitor {
  padding: 12px;
  border-bottom: 1px solid #00ff4122;
}
.monitor-title {
  font-size: 10px;
  color: #00ff4188;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.metric {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 12px;
}
.metric-label { color: #888; }
.metric-value { color: #00ff41; font-weight: bold; }
.metric-value.warn { color: #f3e779; }
.metric-value.critical { color: #ff5555; }

/* 进度条 */
.progress-bar {
  height: 4px;
  background: #1a1a1a;
  border-radius: 2px;
  margin: 8px 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00ff41, #00ccff);
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}
.progress-fill.warn { background: linear-gradient(90deg, #f3e779, #ff9b43); }

/* 日志流 */
.log-panel {
  flex: 1;
  padding: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.log-content {
  flex: 1;
  overflow: hidden;
  font-size: 11px;
}
.log-line {
  margin-bottom: 2px;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.log-line.visible { opacity: 1; }
.log-time { color: #555; }
.log-ok { color: #00ff41; }
.log-warn { color: #f3e779; }
.log-err { color: #ff5555; }
.log-info { color: #69b4ff; }

/* 底部矩阵动画 */
.matrix-bar {
  height: 60px;
  border-top: 1px solid #00ff4122;
  padding: 4px 12px;
  overflow: hidden;
  display: flex;
  gap: 4px;
  align-items: flex-end;
}
.matrix-col {
  width: 3px;
  background: #00ff41;
  opacity: 0.15;
  transition: height 0.3s;
}

/* 打字光标闪烁 */
@keyframes pulse { 0%,100% { box-shadow: 0 0 5px #00ff41; } 50% { box-shadow: 0 0 20px #00ff41, 0 0 40px #00ff4155; } }
.glow { animation: pulse 2s infinite; }
</style>

// === 渲染代码 ===
const codeEl = document.getElementById('codeContent');
let codeIdx = 0;
let codeInterval;

function addCodeLine() {
  if (codeIdx >= codeLines.length) {
    // 代码显示完了，循环重来
    setTimeout(() => {
      codeEl.innerHTML = '';
      codeIdx = 0;
      logIdx = 0;
      document.getElementById('logContent').innerHTML = '';
      iteration = 0;
      startAll();
    }, 3000);
    return;
  }
  const line = document.createElement('div');
  line.className = 'code-line';
  line.innerHTML = `<span class="line-num">${String(codeIdx + 1).padStart(3, ' ')}</span>${codeLines[codeIdx][0] || '&nbsp;'}`;
  codeEl.appendChild(line);
  requestAnimationFrame(() => line.classList.add('visible'));
  
  // 自动滚动
  if (codeEl.children.length > 30) {
    codeEl.children[0].remove();
  }
  codeEl.scrollTop = codeEl.scrollHeight;
  
  // 更新代码进度
  document.getElementById('codeProgress').textContent = Math.round((codeIdx / codeLines.length) * 100) + '%';
  codeIdx++;
}

// === 日志流 ===
const logEl = document.getElementById('logContent');
let logIdx = 0;

function addLogLine() {
  if (logIdx >= logMessages.length) return;
  const msg = logMessages[logIdx];
  const now = new Date();
  const time = now.toTimeString().split(' ')[0] + '.' + String(now.getMilliseconds()).padStart(3,'0');
  const line = document.createElement('div');
  line.className = 'log-line';
  const typeClass = { ok: 'log-ok', warn: 'log-warn', err: 'log-err', info: 'log-info' }[msg.type] || 'log-ok';
  line.innerHTML = `<span class="log-time">${time}</span> <span class="${typeClass}">[${msg.type.toUpperCase()}]</span> ${msg.text}`;
  logEl.appendChild(line);
  requestAnimationFrame(() => line.classList.add('visible'));
  
  if (logEl.children.length > 25) logEl.children[0].remove();
  logIdx++;
}

  const progress = logIdx / logMessages.length;
  
  // CPU - 随机波动
  const cpu = Math.min(98, 30 + Math.random() * 50 + progress * 20);
  document.getElementById('cpuVal').textContent = cpu.toFixed(1) + '%';
  document.getElementById('cpuVal').className = 'metric-value' + (cpu > 85 ? ' critical' : cpu > 60 ? ' warn' : '');
  document.getElementById('cpuBar').style.width = cpu + '%';
  
  // Memory - 缓慢增长
  const mem = 2048 + progress * 6000 + Math.random() * 500;
  document.getElementById('memVal').textContent = mem.toFixed(0) + ' MB';
  document.getElementById('memVal').className = 'metric-value' + (mem > 7000 ? ' warn' : '');
  document.getElementById('memBar').style.width = (mem / 8192 * 100) + '%';
  
  // GPU
  const gpu = 5 + Math.random() * 40 + progress * 80;
  document.getElementById('gpuVal').textContent = gpu.toFixed(1) + ' TFLOPS';
  document.getElementById('gpuBar').style.width = (gpu / 120 * 100) + '%';
  
  // Network
  const net = Math.random() * 500 + 100;
  document.getElementById('netVal').textContent = net.toFixed(0) + ' MB/s';
  document.getElementById('netBar').style.width = Math.min(100, net / 8) + '%';
  
  // Iterations
  iteration += Math.floor(Math.random() * 30 + 10);
  if (iteration > 10000) iteration = 10000;
  document.getElementById('iterVal').textContent = iteration.toLocaleString() + ' / 10,000';
}

// === 矩阵动画 ===
const matrixBar = document.getElementById('matrixBar');
const cols = 80;
for (let i = 0; i < cols; i++) {
  const col = document.createElement('div');
  col.className = 'matrix-col';
  matrixBar.appendChild(col);
}

function updateMatrix() {
  const children = matrixBar.children;
  for (let i = 0; i < children.length; i++) {
    const h = Math.random() * 50 + 5;
    children[i].style.height = h + 'px';
    children[i].style.opacity = (0.1 + Math.random() * 0.4).toFixed(2);
  }
}

// === 启动 ===
function startAll() {
  codeInterval = setInterval(addCodeLine, 180);
  setInterval(addLogLine, 1200);
  setInterval(updateMetrics, 400);
  setInterval(updateMatrix, 200);
}

startAll();
</script>
</body>
